                            <label for="lastname" class="contactForm" required>Last name:</label><br>

                            <label for="email" class="contactForm" required>Email:</label><br>
                            <input type="text" id="email" class="contactForm" name="contact" placeholder="Enter your Email"><br>
                            <label for="message" class="contactForm" required>Message:</label><br>
                            <textarea rows="10" cols="50" class="contactForm" id="message" name="contact" placeholder="Enter your message" maxlength="1000"></textarea><br>
