<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/stylesheets/header.css" class="stylesheet">
    <link rel="stylesheet" href="/stylesheets/stylesheet.css" class="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/images/logo_thumbnail.jpg" alt="Tremain Labs Logo" class="logo">
        </div>
        <div class="navigation">
            <nav>
                <ul class="navigationbar">
                    <li><a href="/pages/aboutme.html">About</a></li>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/pages/projects.html">Projects</a></li>
                </ul>
            </nav>
            <p class="greeting">Welcome to Tremain Labs.</p>
        </div>
        <div class="search">
                    <input type="text" placeholder="search" id="search"><br>
                    <button type="button">Login In</button>
        </div>
    </header>

    <main class="inputForm">
        <div class="gridStyle" id="contactHeading">
            <div class="glass">
                <h1 class="contactHeading">Contact us</h1>
                <p class="contactHeading">Please reach out with any questions here.</p>
            </div>
        </div>
        <div class="grid">
            
            <div class="gridStyle" id="contactForm">
                <div class="formGlass">  
                    <form>  
                        <label for="firstname" required class="contactForm">First name:</label><br>
                        <input type="text" id="firstname" class="contactForm" name="contact" placeholder="Enter your name"><br>
                        <label for="lastname" class="contactForm" required>Last name:</label><br>
                        <input type="text" id="firstname" class="contactForm" name="contact" placeholder="Enter your name"><br>
                        <label for="businessname" class="contactForm">Business name:</label><br>
                        <input type="text" id="businessname" class="contactForm" name="contact" placeholder="Enter your business name"><br>
                        <label for="email" class="contactForm" required>Email:</label><br>
                        <input type="text" id="email" class="contactForm" name="contact" placeholder="Enter your Email"><br>
                        <label for="message" class="contactForm" required>Message:</label><br>
                        <textarea rows="10" cols="50" class="contactForm" id="message" name="contact" placeholder="Enter your message" maxlength="1000"></textarea><br>
                        <button type="submit" class="contactForm" name="contact">Submit</button>
                    </form>
                </div>
            </div>
            
            <div class="gridStyle">
                <div class="glass">
                    <div class="parentCard">
                        <div class="card">
                            <div class="logoCard">
                                <span class="circle circle1"></span>
                                <span class="circle circle2"></span>
                                <span class="circle circle3"></span>
                                <span class="circle circle4"></span>
                            </div> 
                            <div class="content">
                                <span class="title">Social Media</span>
                                <span class="text">Connect with Daniel on Facebook, and Linkedin.</span>
                            </div>
                            <div class="social-button social-button1">
                                <button class="social-button social-button1"><svg viewbox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" class="svg"><path d></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
